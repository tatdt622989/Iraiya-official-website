name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: iraiya-official-website-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test, build, and publish image
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build static site
        run: pnpm build

      - name: Build Docker image
        run: docker build --pull -t "$IMAGE_NAME:ci-${{ github.sha }}" .

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Docker image
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          docker tag "$IMAGE_NAME:ci-${{ github.sha }}" "$IMAGE_NAME:latest"
          docker tag "$IMAGE_NAME:ci-${{ github.sha }}" "$IMAGE_NAME:main"
          docker tag "$IMAGE_NAME:ci-${{ github.sha }}" "$IMAGE_NAME:sha-${{ github.sha }}"
          docker push "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:main"
          docker push "$IMAGE_NAME:sha-${{ github.sha }}"

      - name: Trigger Coolify image redeploy
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          COOLIFY_DEPLOY_URL: ${{ secrets.COOLIFY_DEPLOY_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          if [ -z "$COOLIFY_DEPLOY_URL" ]; then
            echo "COOLIFY_DEPLOY_URL secret is not set."
            exit 1
          fi
          if [ -z "$COOLIFY_API_TOKEN" ]; then
            echo "COOLIFY_API_TOKEN secret is not set."
            exit 1
          fi
          if [[ "$COOLIFY_DEPLOY_URL" == *"/source/"*"/events"* ]]; then
            echo "Manual Git webhook URLs cannot trigger pre-built image deployments."
            echo "Set COOLIFY_DEPLOY_URL to https://<coolify-domain>/api/v1/deploy?uuid=<resource-uuid>."
            exit 1
          fi
          if [[ "$COOLIFY_DEPLOY_URL" != *"/api/v1/deploy?uuid="* ]]; then
            echo "COOLIFY_DEPLOY_URL should be the Coolify API deploy endpoint."
            echo "Expected format: https://<coolify-domain>/api/v1/deploy?uuid=<resource-uuid>."
            exit 1
          fi

          response="$(curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $COOLIFY_API_TOKEN" \
            "$COOLIFY_DEPLOY_URL")"

          echo "$response"

          if ! echo "$response" | grep -Eq '"deployments"|"deployment_uuid"'; then
            echo "Coolify did not queue a deployment."
            exit 1
          fi

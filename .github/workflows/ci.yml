name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: iraiya-official-website-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test, build, and publish image
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build static site
        run: pnpm build

      - name: Build Docker image
        run: docker build --pull -t "$IMAGE_NAME:ci-${{ github.sha }}" .

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag "$IMAGE_NAME:ci-${{ github.sha }}" "$IMAGE_NAME:main"
          docker tag "$IMAGE_NAME:ci-${{ github.sha }}" "$IMAGE_NAME:sha-${{ github.sha }}"
          docker push "$IMAGE_NAME:main"
          docker push "$IMAGE_NAME:sha-${{ github.sha }}"

      - name: Trigger Coolify image redeploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$COOLIFY_DEPLOY_WEBHOOK" ]; then
            echo "COOLIFY_DEPLOY_WEBHOOK secret is not set."
            exit 1
          fi

          curl --fail --silent --show-error --request POST "$COOLIFY_DEPLOY_WEBHOOK"
